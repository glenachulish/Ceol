name: Build Mac App

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-mac-arm:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install fastapi uvicorn sqlalchemy aiofiles python-multipart \
            requests httpx PyPDF2 pydantic pillow pyinstaller \
            pywebview pyobjc-core pyobjc-framework-Cocoa pyobjc-framework-WebKit pyobjc-framework-Quartz
      - name: Create icns icon
        run: |
          python3 -c "
          import os, subprocess
          from PIL import Image
          os.makedirs('Ceol.iconset', exist_ok=True)
          img = Image.open('frontend/static/icons/icon-512.png').convert('RGBA')
          for size, names in [
            (16,  ['icon_16x16.png']),
            (32,  ['icon_16x16@2x.png', 'icon_32x32.png']),
            (64,  ['icon_32x32@2x.png']),
            (128, ['icon_128x128.png']),
            (256, ['icon_128x128@2x.png', 'icon_256x256.png']),
            (512, ['icon_256x256@2x.png', 'icon_512x512.png']),
          ]:
            r = img.resize((size, size), Image.LANCZOS)
            for n in names:
              r.save(f'Ceol.iconset/{n}')
          subprocess.run(['iconutil', '-c', 'icns', 'Ceol.iconset'], check=True)
          assert os.path.getsize('Ceol.icns') > 0, 'icns is empty!'
          print(f'icns created OK ({os.path.getsize(\"Ceol.icns\")} bytes)')
          "
      - name: Build app
        run: |
          pyinstaller --onedir --windowed --name Ceol ceol_app.py \
            --icon Ceol.icns \
            --add-data "frontend:frontend" \
            --add-data "backend:backend" \
            --hidden-import uvicorn.logging \
            --hidden-import uvicorn.loops \
            --hidden-import uvicorn.loops.auto \
            --hidden-import uvicorn.protocols \
            --hidden-import uvicorn.protocols.http \
            --hidden-import uvicorn.protocols.http.auto \
            --hidden-import uvicorn.protocols.websockets \
            --hidden-import uvicorn.protocols.websockets.auto \
            --hidden-import uvicorn.lifespan \
            --hidden-import uvicorn.lifespan.on \
            --hidden-import sqlalchemy.dialects.sqlite \
            --collect-all fastapi \
            --collect-all webview \
            --collect-all pyobjc
      - name: Patch bundle icon, name, and create DMG
        run: |
          # Force-copy icon into the bundle Resources
          cp Ceol.icns dist/Ceol.app/Contents/Resources/
          ls -la dist/Ceol.app/Contents/Resources/Ceol.icns

          # Patch plist: set accent name + ensure icon file reference
          python3 -c "
          import plistlib
          p = 'dist/Ceol.app/Contents/Info.plist'
          with open(p,'rb') as f: d = plistlib.load(f)
          d['CFBundleName'] = 'Ce\u00f2l'
          d['CFBundleDisplayName'] = 'Ce\u00f2l'
          d['CFBundleIconFile'] = 'Ceol.icns'
          with open(p,'wb') as f: plistlib.dump(d, f)
          print('plist patched OK:', {k: d[k] for k in ['CFBundleName','CFBundleDisplayName','CFBundleIconFile']})
          "

          mkdir -p dist/dmg
          mv "dist/Ceol.app" "dist/dmg/Ce\u00f2l.app"
          hdiutil create -volname "Ce\u00f2l" -srcfolder dist/dmg -ov -format UDZO "dist/Ceol-${{ github.ref_name }}-arm64.dmg"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ceol-arm64
          path: dist/Ceol-${{ github.ref_name }}-arm64.dmg

  release:
    needs: build-mac-arm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: Ceol-arm64
      - uses: softprops/action-gh-release@v2
        with:
          files: Ceol-*-arm64.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
