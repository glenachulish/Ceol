name: Build Mac App

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-mac-arm:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install py2app pillow \
            fastapi uvicorn sqlalchemy aiofiles python-multipart \
            requests httpx PyPDF2 pydantic \
            pywebview pyobjc-core pyobjc-framework-Cocoa \
            pyobjc-framework-WebKit pyobjc-framework-Quartz
      - name: Create icns icon
        run: |
          python3 << 'PYEOF'
          import os, subprocess
          from PIL import Image
          os.makedirs('Ceol.iconset', exist_ok=True)
          img = Image.open('frontend/static/icons/icon-512.png').convert('RGBA')
          for size, names in [
            (16,  ['icon_16x16.png']),
            (32,  ['icon_16x16@2x.png', 'icon_32x32.png']),
            (64,  ['icon_32x32@2x.png']),
            (128, ['icon_128x128.png']),
            (256, ['icon_128x128@2x.png', 'icon_256x256.png']),
            (512, ['icon_256x256@2x.png', 'icon_512x512.png']),
          ]:
            r = img.resize((size, size), Image.LANCZOS)
            for n in names:
              r.save(f'Ceol.iconset/{n}')
          subprocess.run(['iconutil', '-c', 'icns', 'Ceol.iconset'], check=True)
          sz = os.path.getsize('Ceol.icns')
          assert sz > 1000, f'icns too small ({sz} bytes)'
          print(f'icns created OK ({sz} bytes)')
          PYEOF
      - name: Build app with py2app
        run: |
          python setup_mac.py py2app
          # Verify the bundle was created
          ls -la "dist/Ce\u00f2l.app/Contents/Info.plist"
          ls -la "dist/Ce\u00f2l.app/Contents/Resources/"
      - name: Create DMG
        run: |
          hdiutil create -volname "Ce\u00f2l" -srcfolder dist -ov -format UDZO "dist/Ceol-${{ github.ref_name }}-arm64.dmg"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ceol-arm64
          path: dist/Ceol-${{ github.ref_name }}-arm64.dmg

  release:
    needs: build-mac-arm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: Ceol-arm64
      - uses: softprops/action-gh-release@v2
        with:
          files: Ceol-*-arm64.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
