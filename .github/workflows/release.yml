name: Build Mac App

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-mac-arm:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install pyinstaller pillow \
            fastapi uvicorn sqlalchemy aiofiles python-multipart \
            requests httpx PyPDF2 pydantic

      - name: Create icns icon
        run: |
          python3 << 'PYEOF'
          import os, subprocess
          from PIL import Image
          os.makedirs('Ceol.iconset', exist_ok=True)
          img = Image.open('frontend/static/icons/icon-512.png').convert('RGBA')
          for size, names in [
            (16,  ['icon_16x16.png']),
            (32,  ['icon_16x16@2x.png', 'icon_32x32.png']),
            (64,  ['icon_32x32@2x.png']),
            (128, ['icon_128x128.png']),
            (256, ['icon_128x128@2x.png', 'icon_256x256.png']),
            (512, ['icon_256x256@2x.png', 'icon_512x512.png']),
          ]:
            r = img.resize((size, size), Image.LANCZOS)
            for n in names:
              r.save(f'Ceol.iconset/{n}')
          subprocess.run(['iconutil', '-c', 'icns', 'Ceol.iconset'], check=True)
          sz = os.path.getsize('Ceol.icns')
          assert sz > 1000, f'icns too small ({sz} bytes)'
          print(f'icns created OK ({sz} bytes)')
          PYEOF

      - name: Build Python server with PyInstaller
        run: |
          pyinstaller --onedir --noconsole --name ceol_server ceol_app.py \
            --add-data "frontend:frontend" \
            --hidden-import _sqlite3 \
            --hidden-import sqlalchemy.dialects.sqlite \
            --collect-all fastapi \
            --collect-all uvicorn \
            --collect-all starlette \
            --collect-all anyio
          echo "Server built OK"
          ls dist/ceol_server/

      - name: Compile Swift native launcher
        run: |
          swiftc -O -o CeolApp CeolApp.swift \
            -framework Cocoa -framework WebKit \
            -target arm64-apple-macosx12.0
          echo "Swift launcher compiled OK"

      - name: Assemble .app bundle
        run: |
          APP="dist/Ce\u00f2l.app"
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources/server"

          # Main executable: Swift launcher
          cp CeolApp "$APP/Contents/MacOS/CeolApp"
          chmod +x "$APP/Contents/MacOS/CeolApp"

          # Server: entire PyInstaller output
          cp -R dist/ceol_server/* "$APP/Contents/Resources/server/"
          chmod +x "$APP/Contents/Resources/server/ceol_server"

          # Icon
          cp Ceol.icns "$APP/Contents/Resources/Ceol.icns"

          # Info.plist
          cat > "$APP/Contents/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>CeolApp</string>
            <key>CFBundleName</key>
            <string>Ceòl</string>
            <key>CFBundleDisplayName</key>
            <string>Ceòl</string>
            <key>CFBundleIdentifier</key>
            <string>com.glenachulish.ceol</string>
            <key>CFBundleVersion</key>
            <string>1.0</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>CFBundleIconFile</key>
            <string>Ceol.icns</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleSignature</key>
            <string>????</string>
            <key>NSHighResolutionCapable</key>
            <true/>
            <key>LSMinimumSystemVersion</key>
            <string>12.0</string>
            <key>NSAppTransportSecurity</key>
            <dict>
              <key>NSAllowsLocalNetworking</key>
              <true/>
            </dict>
          </dict>
          </plist>
          PLIST

          echo "App bundle assembled OK"
          ls -la "$APP/Contents/MacOS/"
          ls -la "$APP/Contents/Resources/"

      - name: Create DMG
        run: |
          mkdir -p dist/dmg
          cp -R "dist/Ce\u00f2l.app" dist/dmg/
          hdiutil create -volname "Ce\u00f2l" -srcfolder dist/dmg \
            -ov -format UDZO "dist/Ceol-${{ github.ref_name }}-arm64.dmg"
          echo "DMG created OK"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ceol-arm64
          path: dist/Ceol-${{ github.ref_name }}-arm64.dmg

  release:
    needs: build-mac-arm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: Ceol-arm64
      - uses: softprops/action-gh-release@v2
        with:
          files: Ceol-*-arm64.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
