name: Build Mac App

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-mac-arm:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install fastapi uvicorn sqlalchemy aiofiles python-multipart requests pyinstaller
      - name: Build app
        run: |
          pyinstaller --onefile --windowed --name Ceol ceol_app.py \
            --add-data "frontend:frontend" \
            --add-data "backend:backend"
          mkdir -p dist/dmg
          cp -r dist/Ceol.app dist/dmg/
          hdiutil create -volname Ceol -srcfolder dist/dmg -ov -format UDZO dist/Ceol-arm64.dmg
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ceol-arm64
          path: dist/Ceol-arm64.dmg

  release:
    needs: build-mac-arm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: Ceol-arm64
      - uses: softprops/action-gh-release@v2
        with:
          files: Ceol-arm64.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
