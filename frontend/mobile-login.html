<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Ceòl — Log in</title>
  <link rel="manifest" href="/static/manifest.json">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0f1117;
      --surface: #1a1d27;
      --border:  #2e3350;
      --accent:  #7c6af7;
      --text:    #e2e8f0;
      --muted:   #8892aa;
      --danger:  #ef4444;
      --radius:  10px;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: env(safe-area-inset-top, 20px) 1.5rem
               env(safe-area-inset-bottom, 20px) 1.5rem;
    }
    .login-card {
      width: 100%;
      max-width: 380px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem 1.75rem;
    }
    .login-logo {
      text-align: center;
      margin-bottom: 1.75rem;
    }
    .login-logo h1 {
      font-size: 2rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -.02em;
    }
    .login-logo p {
      color: var(--muted);
      font-size: .875rem;
      margin-top: .25rem;
    }
    .login-field {
      margin-bottom: 1rem;
    }
    .login-field label {
      display: block;
      font-size: .8rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: .4rem;
    }
    .login-field input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 1rem;
      padding: .75rem 1rem;
      outline: none;
      -webkit-appearance: none;
    }
    .login-field input:focus {
      border-color: var(--accent);
    }
    .login-btn {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 600;
      padding: .85rem;
      cursor: pointer;
      margin-top: .5rem;
      -webkit-appearance: none;
    }
    .login-btn:disabled {
      opacity: .6;
    }
    .login-error {
      color: var(--danger);
      font-size: .875rem;
      margin-top: .75rem;
      text-align: center;
      min-height: 1.25rem;
    }
    .login-hint {
      margin-top: .4rem;
      font-size: .8rem;
      text-align: right;
    }
    .login-hint a {
      color: var(--muted);
      text-decoration: none;
    }
    .login-hint a:hover {
      color: var(--accent);
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <h1>Ceòl</h1>
      <p>Trad Music Library</p>
    </div>
    <form id="login-form" autocomplete="on">
      <div class="login-field">
        <label for="username">Username</label>
        <input
          id="username"
          name="username"
          type="text"
          autocomplete="username"
          autocorrect="off"
          autocapitalize="none"
          spellcheck="false"
          placeholder="callum"
          required
        >
      </div>
      <div class="login-field">
        <label for="password">Password</label>
        <input
          id="password"
          name="password"
          type="password"
          autocomplete="current-password"
          placeholder="••••••••"
          required
        >
        <div class="login-hint">
          <a href="/forgot-password">Forgot password?</a>
        </div>
      </div>
      <button class="login-btn" type="submit" id="login-btn">Log in</button>
      <div class="login-error" id="login-error" aria-live="polite"></div>
    </form>
  </div>
  <script>
    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn   = document.getElementById("login-btn");
      const err   = document.getElementById("login-error");
      const user  = document.getElementById("username").value.trim();
      const pass  = document.getElementById("password").value;
      btn.disabled = true;
      btn.textContent = "Logging in…";
      err.textContent = "";
      try {
        const res = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username: user, password: pass }),
          credentials: "include",
        });
        if (res.ok) {
          // Redirect to app — or back to the page they were trying to reach
          const params = new URLSearchParams(window.location.search);
          window.location.href = params.get("next") || "/mobile";
        } else {
          const data = await res.json().catch(() => ({}));
          err.textContent = data.detail || "Incorrect username or password.";
          btn.disabled = false;
          btn.textContent = "Log in";
        }
      } catch {
        err.textContent = "Could not connect to server. Is the Pi running?";
        btn.disabled = false;
        btn.textContent = "Log in";
      }
    });
  </script>
</body>
</html>
