<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Ceòl — Forgot password</title>
  <link rel="manifest" href="/static/manifest.json">
  <style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:      #0f1117;
  --surface: #1a1d27;
  --border:  #2e3350;
  --accent:  #7c6af7;
  --text:    #e2e8f0;
  --muted:   #8892aa;
  --danger:  #ef4444;
  --success: #10b981;
  --radius:  10px;
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  min-height: 100dvh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: env(safe-area-inset-top, 20px) 1.5rem
           env(safe-area-inset-bottom, 20px) 1.5rem;
}
.card {
  width: 100%;
  max-width: 380px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 2rem 1.75rem;
}
.logo {
  text-align: center;
  margin-bottom: 1.75rem;
}
.logo h1 {
  font-size: 2rem;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -.02em;
}
.logo p {
  color: var(--muted);
  font-size: .875rem;
  margin-top: .25rem;
}
.field { margin-bottom: 1rem; }
.field label {
  display: block;
  font-size: .8rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .06em;
  margin-bottom: .4rem;
}
.field input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-size: 1rem;
  padding: .75rem 1rem;
  outline: none;
  -webkit-appearance: none;
}
.field input:focus { border-color: var(--accent); }
.hint {
  margin-top: .35rem;
  color: var(--muted);
  font-size: .75rem;
}
.btn {
  width: 100%;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  font-size: 1rem;
  font-weight: 600;
  padding: .85rem;
  cursor: pointer;
  margin-top: .5rem;
  -webkit-appearance: none;
}
.btn:disabled { opacity: .6; }
.btn-secondary {
  background: transparent;
  color: var(--muted);
  border: 1px solid var(--border);
}
.msg {
  font-size: .875rem;
  margin-top: .75rem;
  text-align: center;
  min-height: 1.25rem;
}
.msg.err { color: var(--danger); }
.msg.ok  { color: var(--success); }
.back {
  display: block;
  margin-top: 1rem;
  text-align: center;
  font-size: .8rem;
  color: var(--muted);
  text-decoration: none;
}
.back:hover { color: var(--accent); }

  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>Ceòl</h1>
    <p>Forgot password</p>
  </div>
  <form id="forgot-form">
    <div class="field">
      <label for="identifier">Username or email</label>
      <input id="identifier" name="identifier" type="text"
             autocomplete="username" autocapitalize="none"
             autocorrect="off" spellcheck="false" required>
      <div class="hint">
        We'll let an admin know. They'll send you a reset link.
      </div>
    </div>
    <button class="btn" type="submit" id="submit-btn">Request reset</button>
    <div class="msg ok" id="msg" aria-live="polite"></div>
  </form>
  <a href="/login" class="back">← Back to login</a>
</div>
<script>
document.getElementById("forgot-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const btn = document.getElementById("submit-btn");
  const msg = document.getElementById("msg");
  const val = document.getElementById("identifier").value.trim();
  btn.disabled = true;
  btn.textContent = "Sending…";
  try {
    await fetch("/api/auth/forgot-password", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({identifier: val}),
    });
    msg.textContent = "Thanks — if we have an account for that, an admin has been notified.";
    btn.style.display = "none";
  } catch {
    msg.textContent = "Couldn't reach the server. Try again in a moment.";
    msg.className = "msg err";
    btn.disabled = false;
    btn.textContent = "Request reset";
  }
});
</script>

</body>
</html>
